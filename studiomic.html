<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product - Bravegadgets</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">🎹 Bravegadgets</div>
    </header>

    <section class="product-page">
      <div class="product-image">
        <img src="images/studio mic.avif" alt="" />
      </div>

      <div class="product-details">
        <h2>Studio Condenser Microphone</h2>

        <p class="price">₦85,000</p>

        <p class="rating">⭐⭐⭐⭐☆ (4.5/5)</p>

        <p class="bought">1,245 musicians bought this</p>

        <p class="description">
          Perfect for studio recording and ideal for live concerts.
        </p>

        <div class="quantity">
          <button onclick="decrease()">-</button>
          <span id="qty">1</span>
          <button onclick="increase()">+</button>
        </div>

        <button class="buy-btn">Buy Now</button>
      </div>
    </section>
  </body>
</html>
